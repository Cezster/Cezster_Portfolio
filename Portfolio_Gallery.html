<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Page</title>
    <link rel="preload" as="image" href="BackGround.png">
    <link rel="stylesheet" href="Portfolio.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,100..900;1,100..900&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar">
    <div><h1>Cezster Portfolio</h1></div>
    <nav>
        <a href="Portfolio.html" class="btn">HomePage</a>
        <a href="Portfolio_Contact.html" class="btn">Contact Information</a>
        <a href="Portfolio_Projects.html" class="btn">Current Projects</a>
    </nav>
  </header>
<section class="gallery">

  <div class="category">
    <button class="category-toggle">Characters</button>
    <div class="category-content">
      <div class="gallery-item"><div class="model-viewer"data-model="models/char/character1.glb"data-poster="images/char/character1.png"></div></div>
      <div class="gallery-item">Character Model 2</div>
    </div>
  </div>

  <div class="category">
    <button class="category-toggle">Environments</button>
    <div class="category-content">
      <div class="gallery-item">Environment 1</div>
      <div class="gallery-item">Environment 2</div>
    </div>
  </div>

  <div class="category">
    <button class="category-toggle">Props / Objects</button>
    <div class="category-content">
      <div class="gallery-item">Prop 1</div>
      <div class="gallery-item">Prop 2</div>
    </div>
  </div>
  <div class="category">
    <button class="category-toggle">Buildings</button>
    <div class="category-content">
      <div class="gallery-item">Prop 1</div>
      <div class="gallery-item">Prop 2</div>
    </div>
  </div>

</section>

<script>
document.addEventListener("DOMContentLoaded", () => {
  document.body.classList.add("loaded");
});

const links = document.querySelectorAll("a");
links.forEach(link => {
  if (link.hostname === location.hostname) {
    link.addEventListener("click", e => {
      e.preventDefault();
      const href = link.getAttribute("href");
      document.body.style.opacity = 0;
      setTimeout(() => {
        window.location.href = href;
      }, 500);
    });
  }
});
</script>

<script>
const toggles = document.querySelectorAll(".category-toggle");

toggles.forEach(toggle => {
  toggle.addEventListener("click", () => {
    const content = toggle.nextElementSibling;
    document.querySelectorAll(".category-content").forEach(item => {
      if (item !== content) {
        item.style.maxHeight = null;
      }
    });

    if (content.style.maxHeight) {
      content.style.maxHeight = null;
    } else {
      content.style.maxHeight = content.scrollHeight + "px";
    }
  });
});
</script>

<script type="module">
import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';
import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';

let activeViewer = null;

document.querySelectorAll(".model-viewer").forEach(container => {

  const modelPath = container.dataset.model;
  const posterPath = container.dataset.poster;
  const img = document.createElement("img");
  img.src = posterPath;
  container.appendChild(img);

  container.addEventListener("click", () => {

    if (activeViewer && activeViewer.container === container) return;

    if (activeViewer) activeViewer.dispose();
    container.innerHTML = "";
    activeViewer = initViewer(container, modelPath);

  });

});

function initViewer(container, modelPath) {
  let scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a1a1a);

  let camera = new THREE.PerspectiveCamera(
    60,
    container.clientWidth / container.clientHeight,
    0.1,
    1000
  );
  camera.position.set(0, 1.5, 3);

  let renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(container.clientWidth, container.clientHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  container.appendChild(renderer.domElement);

  let controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;

  scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.2));
  let dirLight = new THREE.DirectionalLight(0xffffff, 1);
  dirLight.position.set(5, 10, 7);
  scene.add(dirLight);

  let originalMaterials = new Map();
  let model;
  let triangleCount = 0;

  const loader = new GLTFLoader();
  loader.load(modelPath, (gltf) => {
    model = gltf.scene;
    scene.add(model);

    model.traverse(child => {
      if (child.isMesh) {
        originalMaterials.set(child, child.material);
        const geo = child.geometry;
        triangleCount += geo.index ? geo.index.count / 3 : geo.attributes.position.count / 3;
      }
    });

    polyLabel.innerText = "Triangles: " + triangleCount.toLocaleString();
  });

  const ui = document.createElement("div");
  ui.className = "viewer-ui";

  const btnTex = document.createElement("button");
  btnTex.innerText = "Textured";
  btnTex.onclick = () => {
    model?.traverse(child => {
      if (child.isMesh) {
        child.material = originalMaterials.get(child);
        child.material.wireframe = false;
      }
    });
  };

  const btnWire = document.createElement("button");
  btnWire.innerText = "Wireframe";
  btnWire.onclick = () => {
    model?.traverse(child => {
      if (child.isMesh) child.material.wireframe = true;
    });
  };

  const btnSolid = document.createElement("button");
  btnSolid.innerText = "Solid";
  btnSolid.onclick = () => {
    model?.traverse(child => {
      if (child.isMesh) {
        child.material = new THREE.MeshStandardMaterial({
          color: 0x888888,
          roughness: 1,
          metalness: 0
        });
      }
    });
  };

  const polyLabel = document.createElement("div");
  polyLabel.style.marginTop = "5px";
  polyLabel.innerText = "Triangles: ...";

  ui.append(btnTex, btnWire, btnSolid, polyLabel);
  container.appendChild(ui);

  let animId;
  function animate() {
    animId = requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener("resize", () => {
    camera.aspect = container.clientWidth / container.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(container.clientWidth, container.clientHeight);
  });

  return {
    container,
    dispose: () => {
      cancelAnimationFrame(animId);
      controls.dispose();
      renderer.dispose();
      scene.clear();
      container.innerHTML = "";
      // restore poster
      const img = document.createElement("img");
      img.src = container.dataset.poster;
      container.appendChild(img);
    }
  };
}
</script>

</body>
</html>
