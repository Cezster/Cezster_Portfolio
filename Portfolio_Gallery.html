<script>
document.addEventListener("DOMContentLoaded", () => {
  document.body.classList.add("loaded");
});

const links = document.querySelectorAll("a");
links.forEach(link => {
  if (link.hostname === location.hostname) {
    link.addEventListener("click", e => {
      e.preventDefault();
      const href = link.getAttribute("href");
      document.body.style.opacity = 0;
      setTimeout(() => {
        window.location.href = href;
      }, 500);
    });
  }
});
</script>

<script>
const toggles = document.querySelectorAll(".category-toggle");

toggles.forEach(toggle => {
  toggle.addEventListener("click", () => {
    const content = toggle.nextElementSibling;
    document.querySelectorAll(".category-content").forEach(item => {
      if (item !== content) {
        item.style.maxHeight = null;
      }
    });

    if (content.style.maxHeight) {
      content.style.maxHeight = null;
    } else {
      content.style.maxHeight = content.scrollHeight + "px";
    }
  });
});
</script>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",

  }
}
</script>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

let activeViewer = null;

const modal = document.getElementById("viewerModal");
const backdrop = document.getElementById("viewerBackdrop");
const viewerContainer = document.getElementById("viewerContainer");
const closeBtn = document.getElementById("viewerClose");

function openViewer(modelPath) {
  modal.style.display = "block";
  backdrop.style.display = "block";
  activeViewer = initViewer(viewerContainer, modelPath);
}

function closeViewer() {
  modal.style.display = "none";
  backdrop.style.display = "none";
  if (activeViewer) {
    activeViewer.dispose();
    activeViewer = null;
  }
  viewerContainer.innerHTML = "";
}

closeBtn.addEventListener("click", closeViewer);
backdrop.addEventListener("click", closeViewer);

document.querySelectorAll(".model-viewer").forEach(container => {
  const modelPath = container.dataset.model;
  const posterPath = container.dataset.poster;

  const img = document.createElement("img");
  img.src = posterPath;
  container.appendChild(img);

  container.addEventListener("click", () => openViewer(modelPath));
});

function hasAlphaChannel(texture) {
  if (!texture?.image) return false;
  const img = texture.image;
  if (img.src && !img.src.toLowerCase().includes('.png')) return false;
  try {
    const canvas = document.createElement('canvas');
    canvas.width = 8;
    canvas.height = 8;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, 8, 8);
    const data = ctx.getImageData(0, 0, 8, 8).data;
    for (let i = 3; i < data.length; i += 4) {
      if (data[i] < 255) return true;
    }
    return false;
  } catch (e) {
    return false;
  }
}

function initViewer(container, modelPath) {
  let scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a1a1a);

  let camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 0.1, 1000);
  camera.position.set(0, 1.5, 3);

  let renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(container.clientWidth, container.clientHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  container.appendChild(renderer.domElement);

  let controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;

  scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.2));
  let dirLight = new THREE.DirectionalLight(0xffffff, 1);
  dirLight.position.set(5, 10, 7);
  scene.add(dirLight);

  let originalMaterials = new Map();
  let model;
  let triangleCount = 0;
  let mixer;
  let clock = new THREE.Clock();
  let actions = [];
  let currentAction = null;

  const loader = new GLTFLoader();
  loader.load(modelPath, (gltf) => {
    model = gltf.scene;
    scene.add(model);

    model.traverse(child => {
      if (child.isMesh) {
        const mat = child.material;

        const needsAlpha =
          mat.transparent === true ||
          mat.alphaTest > 0 ||
          hasAlphaChannel(mat.map);

        if (needsAlpha) {
          mat.transparent = true;
          mat.alphaTest = 0.1;
          mat.depthWrite = false;
          mat.needsUpdate = true;
        }

        originalMaterials.set(child, mat.clone());
        const geo = child.geometry;
        triangleCount += geo.index
          ? geo.index.count / 3
          : geo.attributes.position.count / 3;
      }
    });

    polyLabel.innerText = "Triangles: " + Math.round(triangleCount).toLocaleString();

    if (gltf.animations && gltf.animations.length > 0) {
      mixer = new THREE.AnimationMixer(model);

      gltf.animations.forEach((clip, index) => {
        const action = mixer.clipAction(clip);
        actions.push(action);

        const btn = document.createElement("button");
        btn.innerText = clip.name || `Anim ${index + 1}`;
        btn.onclick = () => {
          if (currentAction) currentAction.fadeOut(0.3);
          action.reset().fadeIn(0.3).play();
          currentAction = action;
          animContainer.querySelectorAll("button").forEach(b => b.classList.remove("active-anim"));
          btn.classList.add("active-anim");
        };
        animContainer.appendChild(btn);
      });

      animLabel.style.display = "block";
      animContainer.style.display = "flex";

      actions[0].play();
      currentAction = actions[0];
      animContainer.querySelectorAll("button")[0]?.classList.add("active-anim");
    }

  }, undefined, (error) => {
    console.error("GLB load error:", error);
  });

  const ui = document.createElement("div");
  ui.className = "viewer-ui";

  const btnTex = document.createElement("button");
  btnTex.innerText = "Textured";
  btnTex.onclick = () => {
    model?.traverse(child => {
      if (child.isMesh) {
        child.material = originalMaterials.get(child).clone();
        child.material.wireframe = false;
      }
    });
  };

  const btnWire = document.createElement("button");
  btnWire.innerText = "Wireframe";
  btnWire.onclick = () => {
    model?.traverse(child => {
      if (child.isMesh) child.material.wireframe = true;
    });
  };

  const btnSolid = document.createElement("button");
  btnSolid.innerText = "Solid";
  btnSolid.onclick = () => {
    model?.traverse(child => {
      if (child.isMesh) {
        child.material = new THREE.MeshStandardMaterial({
          color: 0x888888,
          roughness: 1,
          metalness: 0
        });
      }
    });
  };

  const polyLabel = document.createElement("div");
  polyLabel.style.marginTop = "5px";
  polyLabel.innerText = "Triangles: ...";

  const animLabel = document.createElement("div");
  animLabel.innerText = "Animations:";
  animLabel.style.display = "none";
  animLabel.style.marginTop = "8px";

  const animContainer = document.createElement("div");
  animContainer.style.display = "none";
  animContainer.style.flexDirection = "column";
  animContainer.style.gap = "4px";

  const btnRest = document.createElement("button");
  btnRest.innerText = "Rest";
  btnRest.onclick = () => {
    actions.forEach(a => a.fadeOut(0.3));
    setTimeout(() => {
      actions.forEach(a => a.stop());
      currentAction = null;
    }, 300);
    animContainer.querySelectorAll("button").forEach(b => b.classList.remove("active-anim"));
  };

  ui.append(btnTex, btnWire, btnSolid, polyLabel, animLabel, btnRest, animContainer);
  container.appendChild(ui);

  let animId;
  function animate() {
    animId = requestAnimationFrame(animate);
    const delta = clock.getDelta();
    if (mixer) mixer.update(delta);
    controls.update();
    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener("resize", () => {
    camera.aspect = container.clientWidth / container.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(container.clientWidth, container.clientHeight);
  });

  return {
    container,
    dispose: () => {
      cancelAnimationFrame(animId);
      controls.dispose();
      renderer.dispose();
      scene.clear();
      container.innerHTML = "";
    }
  };
}
</script>
